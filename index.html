<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEOCIE Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================
           NEOCIE Admin Panel Style
        ========================== */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:40px auto;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);
        }

        h1,h2,h3{
            text-align:center;
            margin-bottom:20px;
        }

        .login-box{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        input{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            margin-bottom: 8px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            background:#000;
            color:#fff;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#D4AF37;
            color:#000;
        }

        #dashboard{
            margin-top:30px;
        }

        #productList{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-top:20px;
        }

        .product-card{
            border:1px solid #ddd;
            border-radius:10px;
            padding:15px;
            text-align:center;
            background:#fafafa;
        }

        .product-card img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:10px;
            margin-bottom:10px;
        }

        .delete-btn{
            background:#e53935;
            margin-top:10px;
        }

        .edit-btn{
            background:#1976d2;
            margin-top:10px;
        }

        .delete-btn:hover,
        .edit-btn:hover{
            opacity: 0.85;
            color:#fff;
        }

        @media(max-width:768px){
            .container{ width:95%; padding:20px; }
            h1{ font-size:28px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NEOCIE Admin Panel</h1>

        <div class="login-box">
            <input type="email" id="email" placeholder="Admin Email">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn">Login</button>
        </div>

        <div id="dashboard" style="display:none;">
            <h2>Dashboard</h2>
            
            <input type="hidden" id="productId"> 

            <input type="text" id="productName" placeholder="Product Name">
            <input type="number" id="productPrice" placeholder="Price">
            <input type="text" id="productCategory" placeholder="Category">
            <input type="file" id="productImage">
            
            <button id="addProduct">Add Product</button>
            <button id="updateProduct" style="display:none; background-color: #2e7d32; margin-top: 10px;">Update Product</button>
            <button id="cancelEdit" style="display:none; background-color: #757575; margin-top: 10px;">Cancel Edit</button>

            <hr style="margin:30px 0; border:0; border-top:1px dashed #ccc;">

            <h3>Live Inventory</h3>
            <div id="productList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-storage.js";

        // ⚠️ Apne Firebase Console credentials se ise replace karein
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Elements
        const loginBox = document.querySelector(".login-box");
        const dashboard = document.getElementById("dashboard");
        const productGrid = document.getElementById("productList");

        const nameInp = document.getElementById("productName");
        const priceInp = document.getElementById("productPrice");
        const catInp = document.getElementById("productCategory");
        const fileInp = document.getElementById("productImage");
        const idInp = document.getElementById("productId");

        const addBtn = document.getElementById("addProduct");
        const updateBtn = document.getElementById("updateProduct");
        const cancelBtn = document.getElementById("cancelEdit");

        // Admin Auth Login
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                alert("Login Successful!");
                loginBox.style.display = "none";
                dashboard.style.display = "block";
                syncInventory();
            } catch (e) {
                alert(e.message);
            }
        };

        // File Storage Upload Handler
        async function uploadImageFile(file) {
            if (!file) return "";
            const storageRef = ref(storage, `products/${Date.now()}_${file.name}`);
            const snapshot = await uploadBytes(storageRef, file);
            return await getDownloadURL(snapshot.ref);
        }

        // Add Product
        addBtn.onclick = async () => {
            const name = nameInp.value;
            const price = priceInp.value;
            const category = catInp.value;
            const file = fileInp.files[0];

            if(!name || !price) return alert("Please fill Product Name and Price.");

            try {
                addBtn.disabled = true;
                addBtn.innerText = "Processing...";
                const imageUrl = file ? await uploadImageFile(file) : "images/placeholder.png";

                await addDoc(collection(db, "products"), {
                    name,
                    price: Number(price),
                    category,
                    imageUrl,
                    created: Date.now()
                });

                alert("Product Added!");
                clearForm();
            } catch (e) {
                alert(e.message);
            } finally {
                addBtn.disabled = false;
                addBtn.innerText = "Add Product";
            }
        };

        // Read Live Data Stream
        function syncInventory() {
            onSnapshot(collection(db, "products"), (snapshot) => {
                productGrid.innerHTML = "";
                snapshot.forEach((doc) => {
                    const item = doc.data();
                    const card = document.createElement("div");
                    card.className = "product-card";
                    card.innerHTML = `
                        <img src="${item.imageUrl || 'images/placeholder.png'}" alt="Thumb">
                        <h4>${item.name}</h4>
                        <p>₹${item.price}</p>
                        <small>${item.category || 'General'}</small>
                        <button class="edit-btn" data-id="${doc.id}" data-name="${item.name}" data-price="${item.price}" data-category="${item.category}">Edit</button>
                        <button class="delete-btn" data-id="${doc.id}">Delete</button>
                    `;
                    productGrid.appendChild(card);
                });
                bindControls();
            });
        }

        // Action controls for items inside grid
        function bindControls() {
            // Delete Process
            document.querySelectorAll(".delete-btn").forEach(btn => {
                btn.onclick = async (e) => {
                    if(confirm("Delete this item permanently?")) {
                        const docId = e.target.getAttribute("data-id");
                        await deleteDoc(doc(db, "products", docId));
                    }
                };
            });

            // Edit Setup Selection
            document.querySelectorAll(".edit-btn").forEach(btn => {
                btn.onclick = (e) => {
                    idInp.value = e.target.getAttribute("data-id");
                    nameInp.value = e.target.getAttribute("data-name");
                    priceInp.value = e.target.getAttribute("data-price");
                    catInp.value = e.target.getAttribute("data-category");

                    addBtn.style.display = "none";
                    updateBtn.style.display = "block";
                    cancelBtn.style.display = "block";
                };
            });
        }

        // Update Submission
        updateBtn.onclick = async () => {
            const id = idInp.value;
            const file = fileInp.files[0];
            
            const fields = {
                name: nameInp.value,
                price: Number(priceInp.value),
                category: catInp.value
            };

            try {
                updateBtn.disabled = true;
                if(file) {
                    fields.imageUrl = await uploadImageFile(file);
                }
                await updateDoc(doc(db, "products", id), fields);
                alert("Product entry updated!");
                clearForm();
            } catch(e) {
                alert(e.message);
            } finally {
                updateBtn.disabled = false;
            }
        };

        cancelBtn.onclick = clearForm;

        function clearForm() {
            idInp.value = "";
            nameInp.value = "";
            priceInp.value = "";
            catInp.value = "";
            fileInp.value = "";
            addBtn.style.display = "block";
            updateBtn.style.display = "none";
            cancelBtn.style.display = "none";
        }
    </script>
</body>
</html>
